# ======================================================================
# MyWhisper configuration
# Every key here is optional — missing keys fall back to these defaults.
# ======================================================================

model:
  name: base.en               # ANY Whisper model or HF CT2 repo id. Measured on a
                              # laptop CPU, base.en is the live-streaming sweet spot;
                              # distil-*.en are more accurate (slower live), and
                              # large-v3-turbo is the multilingual option.
                              # First-run setup picks the right one for your machine.
  device: cpu                 # cuda | cpu | auto  (setup switches GPU machines to cuda)
  compute_type: int8          # GPU: int8_float16 (~1.5GB VRAM, fastest) | float16
                              # CPU: int8
  language: en                # LANGUAGE you dictate in: ISO code (en, hi, es, fr, de, it, pt,
                              #   ja, ko, zh, ru, ar, ...) — or null to AUTO-DETECT each time.
  task: transcribe            # transcribe = write it in the language you spoke
                              # translate  = speak ANY language, get ENGLISH text at your cursor
  stream_language: en         # language used for LIVE partials when language is null/auto
                              #   (auto-detect is unreliable on tiny live buffers)
  beam_size: 2                # final-pass beam: 2 = good, 1 = fastest, 5 = whisper default
  partial_beam_size: 2        # live-streaming beam: 2 balances speed and accuracy (1=fastest, 5=most accurate)
  initial_prompt: null        # vocabulary hint, e.g. "MyWhisper, faster-whisper, CTranslate2"
  download_root: null         # model cache dir (null = HuggingFace default)

recording:
  mode: hold_to_record        # hold_to_record:  hold key = talk · tap = cancel · DOUBLE-TAP = hands-free
                              # press_to_toggle: press hotkey → speak → press again to stop
  hotkey: right alt           # DOUBLE-TAP right alt = start hands-free → tap once = stop & type
                              #   hold right alt = push-to-talk. Fully suppressed (never opens app menus).
                              #   Fn is firmware-only on this laptop (probed twice) and cannot be hooked.
                              # COMBOS also work: ctrl+shift+space, ctrl+win, alt+v
                              # other single keys: f8, num 0, caps lock, scroll lock, pause
  long_press_ms: 250          # (single-key hold mode) held shorter than this = tap (cancel)
  double_tap_lock: true       # (single-key hold mode) double-tap = hands-free lock
  double_tap_ms: 400
  suppress_key: false         # false = poll-only, NO system keyboard hook (robust, recommended;
                              #   the key is observed but not hidden from other apps)
                              # true  = install a low-level hook to swallow the key globally
                              #   (only if you need the key hidden; can lag input under heavy load)
  preroll_ms: 1000            # audio kept from BEFORE you press the hotkey (never lose the first word)
  max_seconds: 600            # safety cap per utterance (10 min — was cutting you off at 2)
  auto_stop:                  # (toggle mode) stop automatically after you go silent
    enabled: false            # off by default — YOU decide when it stops; set true if you
    silence_ms: 900           #   want it to auto-finish ~0.9s after you stop talking
    min_speech_ms: 300

injection:
  method: type                # type  = Win32 SendInput, char-perfect, clipboard untouched
                              # paste = clipboard + Ctrl+V, fastest for long text
  append_space: true          # trailing space so consecutive dictations join nicely
  restore_clipboard: true     # (paste method) restore your old clipboard afterwards

cleanup:
  level: light                # ONE dial for cleanup intensity:
                              #   none   = verbatim (your dictionary rules still apply)
                              #   light  = remove um/uh/erm (default)
                              #   medium = + "scratch that" retractions
                              #   high   = + AI rewrite when Ollama is running
  strip_fillers: true         # cheap regex removal of um/uh/erm...
  expressive:                 # 🔊 voice-aware formatting
    enabled: true
    caps_ratio: 2.5           # segment ≥2.5× louder than the utterance median → TYPES IN CAPS
  llm:                        # the "Wispr magic" — needs a LOCAL LLM server:
                              #   Ollama (ollama pull qwen2.5:3b-instruct), or
                              #   LM Studio / llama.cpp / Jan (OpenAI-compatible)
    enabled: false            # true = always use it; cleanup level "high" also
                              #   engages it automatically when a server is found
    api: auto                 # auto = detect (Ollama first, then LM Studio)
                              #   | ollama | openai
    url: http://localhost:11434          # Ollama
    openai_url: http://localhost:1234/v1 # LM Studio's default local server
    openai_model: null        # null = whatever model the server has loaded
    model: qwen2.5:3b-instruct
    timeout_s: 20
    keep_alive: 10m
    prompt: |
      You are a dictation post-processor. Rewrite the dictated text with correct
      punctuation, capitalization and paragraph breaks. Remove filler words, false
      starts and stutters. Apply the speaker's self-corrections. Never add new
      content, never answer questions found in the text, never translate.
      Output ONLY the cleaned text.

dictionary:                   # YOUR words — tray icon ▸ Dictionary ▸ Edit… then Reload
                              # (quick-adds land in dictionary.yaml next to this file;
                              #  both are merged at load)
  words: []                   # names/jargon Whisper should recognize better, e.g.:
                              #   words: [Svara, Vasudev, CTranslate2, Wispr Flow]
  replacements: {}            # exact fixes applied after transcription (case-insensitive,
                              #   whole words only), e.g.:
                              #   replacements: { "swara": "Svara", "get hub": "GitHub" }
  snippets: {}                # say a trigger phrase, get a block of text, e.g.:
                              #   snippets:
                              #     "my email": "vasu@example.com"
                              #     "sign off": "Best,\nVasudev"
  spoken_punctuation: false   # true → saying "period" / "comma" / "new line" /
                              #   "question mark" / "bullet point" types . , ⏎ ? -

history:
  enabled: true               # keep a local, searchable log of every dictation
                              #   (tray ▸ History… · 100% on your machine: history.db)
  retention_hours: 0          # 0 = keep forever · 24 = auto-delete after a day

context:                      # look at the app you're dictating INTO (all local)
  enabled: true
  title_hotwords: true        # window-title names/nouns boost recognition, e.g. the
                              #   repo or person's name in the title bar
  chat_no_period: true        # drop the trailing period in chat apps (reads better)
  chat_apps: [slack.exe, discord.exe, whatsapp.exe, telegram.exe, ms-teams.exe, signal.exe]
  styles: {}                  # per-app tone for the AI cleanup, e.g.:
                              #   styles: { "slack.exe": "casual and friendly",
                              #             "outlook.exe": "professional email tone" }

shortcuts:                    # global chords (pynput syntax; <cmd> = Win key)
                              # Win+Alt family on purpose — Shift+Alt would toggle
                              # your keyboard layout on multi-language machines
  paste_last: "<cmd>+<alt>+z"     # re-paste the last dictation (chat ate it?)
  copy_last: "<cmd>+<alt>+x"      # copy the last dictation instead
  polish: "<cmd>+<alt>+p"         # rewrite SELECTED text in place (needs a local LLM)
  scratchpad: "<cmd>+<alt>+s"     # toggle the scratchpad note window
  command_key: null               # e.g. f9 — HOLD it and SAY what to do with the
                                  #   selected text ("make this friendlier")

update:
  check: true                 # check GitHub for new Svara releases in the background;
                              #   updates only ever apply when YOU click "Restart to
                              #   update" in the tray
  hours: 24

transforms:
  polish_prompt: null         # custom instruction for the Polish shortcut (null = default:
                              #   clearer + more concise, same meaning and tone)
  max_chars: 8000             # selection size limit

streaming:
  mode: live                  # live    = words are TYPED at your cursor in real time as you talk
                              # preview = words only shown inside the pill; typed after you stop
                              # off     = classic batch (transcribe only after you stop)
  interval_ms: 180            # how often the rolling buffer is re-transcribed (lower = snappier)
  min_audio_s: 0.35           # wait for this much audio before the first word appears

audio:
  sample_rate: 16000
  block_size: 512
  input_device: null          # null = default mic; see: python -m mywhisper --list-devices
  gain: 1.0                   # software mic boost (tray ▸ Whisper mode toggles 3.0
                              #   for speaking-softly-at-2am dictation)

ui:
  sounds: true                # beep on record start/stop
  tray: true                  # system tray icon with theme picker + toggles
  overlay: true               # on-screen "Listening…" pill with live mic level
  theme: minimal-dark         # minimal-dark | minimal-light | matrix | cyberpunk
                              # | sakura | evangelion | saiyan | vaporwave
                              # (also switchable live: tray icon ▸ Theme — that choice persists)
  theme_overrides: {}         # tweak any theme key, e.g.:
                              #   theme_overrides: { accent: "#ff00aa", label_listening: "yo, talk" }
  position: bottom            # bottom | top
  offset_px: 80               # distance from screen edge
  scale: 1.0                  # make the pill bigger/smaller
  pill_width: 195             # pill length in px (slightly wider for the 3 buttons)
  wave: strings               # visualizer: strings | spectrum | bars | scope | pulse
                              #   | particles | beam (kamehameha!) | pixels (8-bit)
                              #   (or click the ✦ diamond on the pill to cycle live)
  wave_weight: 1.0            # thickness multiplier — 0.6 thinner, 1.6 chunkier
  bg: gradient                # pill background: gradient | solid | aurora | carbon | nebula
                              #   | rain (Matrix) | aura (Saiyan flames) | petals (sakura)
                              #   | synthwave (outrun grid) | invaders (8-bit march)
                              #   (or RIGHT-CLICK the pill to cycle live)
  compact: true               # minimal waveform-only pill — just the dot + wave, no text
  glass: false                # (system acrylic blur is broken on this Win11 build)
  style: siri                 # siri  = Apple-Siri-style flowing glowing strings (recommended)
                              # metal = brushed gunmetal with chrome banding + bevels
                              # glass = hand-rendered liquid glass (gradient + sheen)
